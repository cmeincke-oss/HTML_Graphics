<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>Stocktwits Ticker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      background: #1a1a1a;
      overflow: hidden;
    }

    #ticker-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1920px;
      /* Let height be natural — don't constrain it */
      min-height: 40px;
    }

    /* Let the widget render naturally — JS will scale it */
    .stocktwits-widget {
      display: block;
    }

    /* Don't force iframe height — let it be natural */
    #ticker-bar iframe {
      display: block !important;
      border: none !important;
      /* Width only — no height constraint */
      width: 100% !important;
    }
  </style>
</head>
<body>

  <div id="ticker-bar">
    <div class="stocktwits-widget"
      data-animated="true"
      data-asset-class="equity"
      data-color-theme="light"
      data-location="US"
      data-logos="true"
      data-quantity="20"
      data-sparklines="true"
      data-transparent="true"
      data-widget="bar">
      <script async src="https://widgets-api.stocktwits-cdn.com/loader.js"></script>
    </div>
  </div>

  <script>
    function waitForIframe() {
      const iframe = document.querySelector('#ticker-bar iframe');
      if (!iframe) {
        setTimeout(waitForIframe, 200);
        return;
      }

      console.log('[ST] iframe found');
      console.log('[ST] iframe natural size:', iframe.offsetWidth, 'x', iframe.offsetHeight);
      console.log('[ST] iframe style:', iframe.getAttribute('style'));
      console.log('[ST] iframe attributes:');
      Array.from(iframe.attributes).forEach(a => console.log('  ', a.name, '=', a.value));

      // Remove any inline size restrictions the widget set
      iframe.style.removeProperty('width');
      iframe.style.removeProperty('height');
      iframe.style.removeProperty('max-width');

      // Set to full width, auto height
      iframe.style.setProperty('width', '1920px', 'important');
      iframe.style.setProperty('min-width', '1920px', 'important');
      iframe.style.setProperty('display', 'block', 'important');
      iframe.style.setProperty('border', 'none', 'important');

      // Log after a beat to see what size it settled at
      setTimeout(() => {
        console.log('[ST] iframe settled size:', iframe.offsetWidth, 'x', iframe.offsetHeight);
      }, 1000);
    }

    window.addEventListener('load', () => setTimeout(waitForIframe, 300));
  </script>

</body>
</html>
