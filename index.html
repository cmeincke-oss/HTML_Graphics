<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>Stocktwits Ticker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      background: #1a1a1a;
      overflow: hidden;
    }

    #ticker-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1920px;
      height: 150px;
    }

    .stocktwits-widget {
      display: block;
      width: 1920px;
      height: 150px;
    }

    #ticker-bar iframe {
      display: block !important;
      border: none !important;
      width: 1920px !important;
      min-width: 1920px !important;
      /* Do NOT set height here — let the widget animate to 150px naturally */
    }
  </style>
</head>
<body>

  <div id="ticker-bar">
    <div class="stocktwits-widget"
      data-animated="true"
      data-asset-class="equity"
      data-color-theme="light"
      data-location="US"
      data-logos="true"
      data-quantity="20"
      data-sparklines="true"
      data-transparent="true"
      data-widget="bar">
      <script async src="https://widgets-api.stocktwits-cdn.com/loader.js"></script>
    </div>
  </div>

  <script>
    function waitForIframe() {
      const iframe = document.querySelector('#ticker-bar iframe');
      if (!iframe) {
        setTimeout(waitForIframe, 200);
        return;
      }

      console.log('[ST] iframe found — waiting for height transition to complete...');

      // Widget animates height 0 -> 150px over 0.35s
      // Wait 800ms to be safe, then lock it
      setTimeout(() => {
        const h = iframe.offsetHeight;
        console.log('[ST] height after transition:', h);

        // Lock at whatever height it settled at (should be 150)
        iframe.style.setProperty('height', h + 'px', 'important');
        iframe.style.setProperty('min-height', h + 'px', 'important');
        iframe.style.setProperty('transition', 'none', 'important');
        iframe.style.setProperty('width', '1920px', 'important');
        iframe.style.setProperty('min-width', '1920px', 'important');
        iframe.style.setProperty('display', 'block', 'important');
        iframe.style.setProperty('border', 'none', 'important');

        console.log('[ST] locked at:', iframe.offsetWidth, 'x', iframe.offsetHeight);
      }, 800);
    }

    window.addEventListener('load', () => setTimeout(waitForIframe, 300));
  </script>

</body>
</html>
