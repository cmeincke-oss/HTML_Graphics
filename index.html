<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>Stocktwits Ticker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    #ticker-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1920px;
      height: 64px;
      background: #f5f5f5;
      border-top: 3px solid #1a1a2e;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    #ticker-label {
      flex-shrink: 0;
      width: 160px;
      height: 100%;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    #ticker-label span {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    #ticker-track-wrap {
      flex: 1;
      overflow: hidden;
      height: 100%;
      position: relative;
    }

    #ticker-track {
      display: flex;
      align-items: center;
      height: 100%;
      white-space: nowrap;
      will-change: transform;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 28px;
      height: 100%;
      border-right: 1px solid #ddd;
      flex-shrink: 0;
    }

    .ticker-symbol {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.5px;
    }

    .ticker-change { font-size: 15px; font-weight: 500; }
    .ticker-change.up   { color: #16a34a; }
    .ticker-change.down { color: #dc2626; }
    .ticker-change.flat { color: #555; }

    #ticker-status {
      padding-left: 24px;
      font-size: 15px;
      color: #888;
    }
  </style>
</head>
<body>

<div id="ticker-wrap">
  <div id="ticker-label"><span>TRENDING</span></div>
  <div id="ticker-track-wrap">
    <div id="ticker-status">Loading...</div>
    <div id="ticker-track"></div>
  </div>
</div>

<script>
  let animFrame, pos = 0;

  function buildItem(sym) {
    const chg    = sym.quote?.change_percent ?? sym.quotes?.change_percent ?? null;
    const hasChg = chg != null && chg !== 0;
    const dir    = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
    const arrow  = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '';
    const label  = hasChg ? `${arrow} ${Math.abs(chg).toFixed(2)}%` : `${arrow || '—'}`;

    const el = document.createElement('div');
    el.className = 'ticker-item';
    el.innerHTML = `
      <span class="ticker-symbol">${sym.symbol}</span>
      <span class="ticker-change ${dir}">${label}</span>
    `;
    return el;
  }

  function startScroll(track) {
    const half = track.scrollWidth / 2;
    pos = 0;
    function step() {
      pos += 0.6;
      if (pos >= half) pos = 0;
      track.style.transform = `translateX(${-pos}px)`;
      animFrame = requestAnimationFrame(step);
    }
    animFrame = requestAnimationFrame(step);
  }

  async function loadTicker() {
    const status = document.getElementById('ticker-status');
    const track  = document.getElementById('ticker-track');

    try {
      const res  = await fetch('/api/trending');
      const data = await res.json();

      console.log('[ST] API response keys:', Object.keys(data));
      console.log('[ST] First symbol sample:', JSON.stringify(data.symbols?.[0]));

      const syms = data.symbols || data.equities || [];
      if (!syms.length) throw new Error('No symbols returned');

      status.style.display = 'none';
      track.innerHTML = '';
      cancelAnimationFrame(animFrame);

      [...syms, ...syms].forEach(s => track.appendChild(buildItem(s)));
      startScroll(track);

      setTimeout(() => loadTicker(), 60000);

    } catch(e) {
      console.error('[ST Ticker] Error:', e);
      status.textContent = 'Unable to load — retrying...';
      setTimeout(() => loadTicker(), 10000);
    }
  }

  loadTicker();
</script>

</body>
</html>
