<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>Stocktwits Ticker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      background: #1a1a1a;
      overflow: hidden;
    }

    #ticker-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 1920px;
      height: 120px;
      background: rgba(255,0,0,0.2); /* debug: red tint so we can see the container */
    }

    /* Nuclear option — force everything inside to fill */
    #ticker-bar *,
    #ticker-bar iframe {
      display: block !important;
      width: 1920px !important;
      height: 120px !important;
      min-width: 1920px !important;
      min-height: 120px !important;
      max-width: none !important;
      border: none !important;
      overflow: visible !important;
    }
  </style>
</head>
<body>

  <div id="ticker-bar">
    <div class="stocktwits-widget"
      data-animated="true"
      data-asset-class="equity"
      data-color-theme="light"
      data-location="US"
      data-logos="true"
      data-quantity="20"
      data-sparklines="true"
      data-transparent="true"
      data-widget="bar">
      <script async src="https://widgets-api.stocktwits-cdn.com/loader.js"></script>
    </div>
  </div>

  <script>
    function forceSize() {
      const all = document.querySelectorAll('#ticker-bar, #ticker-bar *, #ticker-bar iframe');
      all.forEach(el => {
        el.style.setProperty('width',      '1920px', 'important');
        el.style.setProperty('height',     '120px',  'important');
        el.style.setProperty('min-width',  '1920px', 'important');
        el.style.setProperty('min-height', '120px',  'important');
        el.style.setProperty('display',    'block',  'important');
        el.style.setProperty('border',     'none',   'important');
      });

      const iframes = document.querySelectorAll('#ticker-bar iframe');
      if (iframes.length > 0) {
        console.log('[ST] iframe found and sized — count:', iframes.length);
        // Keep enforcing in case widget resizes itself
        setTimeout(forceSize, 1000);
      } else {
        setTimeout(forceSize, 200);
      }
    }

    window.addEventListener('load', () => forceSize());
  </script>

</body>
</html>
